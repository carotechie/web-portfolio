<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGradient2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:0.3" />
    </radialGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="dropShadow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Ground Shadow -->
    <radialGradient id="groundShadow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient2)"/>
  
  <!-- Ground Shadow -->
  <ellipse cx="350" cy="540" rx="200" ry="30" fill="url(#groundShadow2)"/>
  
  <!-- Chair -->
  <g transform="translate(350, 480)">
    <ellipse cx="0" cy="0" rx="50" ry="10" fill="#475569"/>
    <rect x="-6" y="-70" width="12" height="70" rx="6" fill="#64748b"/>
    <path d="M -40 -70 Q -40 -85 -25 -85 L 25 -85 Q 40 -85 40 -70 L 40 -15 Q 40 0 25 0 L -25 0 Q -40 0 -40 -15 Z" fill="#6366f1" opacity="0.7"/>
    <rect x="-45" y="-75" width="90" height="12" rx="6" fill="#8b5cf6"/>
  </g>
  
  <!-- Woman Character Sitting -->
  <g transform="translate(300, 320)">
    <!-- Long Brown Hair - Back Layer -->
    <path d="M -35 -50 Q -45 -40 -50 -20 Q -52 0 -50 20 Q -48 40 -45 60 Q -42 80 -38 100 L -30 100 Q -32 80 -35 60 Q -38 40 -40 20 Q -42 0 -40 -20 Q -38 -35 -30 -45 Z" fill="#5d4037"/>
    <path d="M 35 -50 Q 45 -40 50 -20 Q 52 0 50 20 Q 48 40 45 60 Q 42 80 38 100 L 30 100 Q 32 80 35 60 Q 38 40 40 20 Q 42 0 40 -20 Q 38 -35 30 -45 Z" fill="#5d4037"/>
    <path d="M -20 -55 Q -25 -35 -28 -10 Q -30 15 -32 40 Q -34 65 -35 90 L -28 92 Q -26 67 -24 42 Q -22 17 -20 -8 Q -18 -33 -15 -50 Z" fill="#5d4037"/>
    <path d="M 20 -55 Q 25 -35 28 -10 Q 30 15 32 40 Q 34 65 35 90 L 28 92 Q 26 67 24 42 Q 22 17 20 -8 Q 18 -33 15 -50 Z" fill="#5d4037"/>
    
    <!-- Dress -->
    <path d="M -40 20 Q -45 40 -50 70 Q -52 90 -50 110 L -35 130 L 35 130 L 50 110 Q 52 90 50 70 Q 45 40 40 20 Q 35 15 25 15 L -25 15 Q -35 15 -40 20 Z" fill="#ec4899"/>
    <!-- Dress shading -->
    <path d="M -38 25 Q -42 45 -46 75 Q -48 95 -46 115 L -37 128 L 37 128 L 46 115 Q 48 95 46 75 Q 42 45 38 25 Z" fill="#d946a6" opacity="0.4"/>
    <!-- Dress neckline -->
    <ellipse cx="0" cy="18" rx="28" ry="8" fill="#f0abfc" opacity="0.3"/>
    
    <!-- Legs (under dress) -->
    <rect x="-25" y="130" width="18" height="50" rx="9" fill="#fbbf24" opacity="0.3"/>
    <rect x="7" y="130" width="18" height="50" rx="9" fill="#fbbf24" opacity="0.3"/>
    
    <!-- Shoes -->
    <ellipse cx="-16" cy="180" rx="12" ry="7" fill="#1e293b"/>
    <ellipse cx="16" cy="180" rx="12" ry="7" fill="#1e293b"/>
    
    <!-- Arms -->
    <!-- Left arm -->
    <path d="M -38 25 Q -52 45 -62 65 Q -68 80 -70 95" stroke="#fbbf24" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Right arm -->
    <path d="M 38 25 Q 52 45 62 65 Q 68 80 70 95" stroke="#fbbf24" stroke-width="14" stroke-linecap="round" fill="none"/>
    
    <!-- Hands -->
    <ellipse cx="-70" cy="100" rx="11" ry="14" fill="#fbbf24"/>
    <ellipse cx="70" cy="100" rx="11" ry="14" fill="#fbbf24"/>
    <!-- Fingers -->
    <path d="M -70 90 L -70 82" stroke="#d4a574" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -66 88 L -66 80" stroke="#d4a574" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 70 90 L 70 82" stroke="#d4a574" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 66 88 L 66 80" stroke="#d4a574" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Neck -->
    <path d="M -8 10 L -10 20 L 10 20 L 8 10 Z" fill="#fbbf24"/>
    
    <!-- Head -->
    <ellipse cx="0" cy="-10" rx="32" ry="38" fill="#fbbf24"/>
    
    <!-- Hair - Front Layer -->
    <path d="M -32 -15 Q -35 -25 -32 -35 Q -28 -45 -20 -48 Q -10 -50 0 -48 Q 10 -50 20 -48 Q 28 -45 32 -35 Q 35 -25 32 -15 L 32 -5 Q 30 5 25 10 L 20 5 Q 22 -5 22 -15 L 22 -25 Q 20 -35 15 -40 Q 10 -43 0 -43 Q -10 -43 -15 -40 Q -20 -35 -22 -25 L -22 -15 Q -22 -5 -20 5 L -25 10 Q -30 5 -32 -5 Z" fill="#5d4037"/>
    <!-- Side bangs -->
    <path d="M -28 -20 Q -30 -10 -28 0 L -25 5 Q -26 -5 -25 -15 Z" fill="#5d4037"/>
    <path d="M 28 -20 Q 30 -10 28 0 L 25 5 Q 26 -5 25 -15 Z" fill="#5d4037"/>
    
    <!-- Face Details -->
    <!-- Eyebrows -->
    <path d="M -18 -15 Q -12 -18 -6 -15" stroke="#5d4037" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M 6 -15 Q 12 -18 18 -15" stroke="#5d4037" stroke-width="2" stroke-linecap="round" fill="none"/>
    
    <!-- Eyes -->
    <ellipse cx="-12" cy="-8" rx="4" ry="5" fill="#1e293b"/>
    <ellipse cx="12" cy="-8" rx="4" ry="5" fill="#1e293b"/>
    <!-- Eye highlights -->
    <ellipse cx="-11" cy="-10" rx="1.5" ry="2" fill="#ffffff"/>
    <ellipse cx="13" cy="-10" rx="1.5" ry="2" fill="#ffffff"/>
    <!-- Eyelashes -->
    <path d="M -15 -10 L -17 -12" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
    <path d="M -13 -11 L -14 -14" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
    <path d="M 15 -10 L 17 -12" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
    <path d="M 13 -11 L 14 -14" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Nose -->
    <path d="M 0 -5 L 0 3" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M -3 3 Q 0 5 3 3" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    
    <!-- Lips -->
    <path d="M -8 10 Q 0 13 8 10" fill="#ec4899" opacity="0.6"/>
    <path d="M -8 10 Q 0 8 8 10" stroke="#d946a6" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Laptop - Side View -->
  <g transform="translate(360, 420)" filter="url(#dropShadow2)">
    <!-- Laptop base (perspective) -->
    <path d="M -15 0 L 70 0 L 75 8 L -20 8 Z" fill="#1e293b"/>
    <path d="M -18 8 L 78 8 L 80 10 L -22 10 Z" fill="#0f172a"/>
    
    <!-- Screen (angled) -->
    <path d="M -10 0 L -18 -85 L 68 -85 L 72 0 Z" fill="#1e293b"/>
    <path d="M -14 -3 L -20 -80 L 64 -80 L 68 -3 Z" fill="#0f172a"/>
    
    <!-- Screen content -->
    <path d="M -17 -8 L -22 -75 L 60 -75 L 64 -8 Z" fill="#0a0a0a"/>
    
    <!-- Dashboard UI -->
    <!-- Header -->
    <path d="M -20 -72 L -21 -66 L 58 -66 L 59 -72 Z" fill="#6366f1"/>
    <circle cx="-18" cy="-69" r="1" fill="#10b981"/>
    <circle cx="-14" cy="-69" r="1" fill="#fbbf24"/>
    <circle cx="-10" cy="-69" r="1" fill="#ec4899"/>
    
    <!-- Chart area -->
    <path d="M -18 -62 L -20 -40 L 18 -40 L 20 -62 Z" fill="#1e293b" stroke="#06b6d4" stroke-width="0.5"/>
    <!-- Line chart -->
    <path d="M -15 -50 L -10 -55 L -5 -48 L 0 -58 L 5 -52 L 10 -56 L 15 -45" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
    
    <!-- Bar chart area -->
    <path d="M 24 -62 L 22 -40 L 54 -40 L 56 -62 Z" fill="#1e293b" stroke="#8b5cf6" stroke-width="0.5"/>
    <!-- Bars -->
    <rect x="26" y="-52" width="4" height="10" fill="#8b5cf6"/>
    <rect x="32" y="-48" width="4" height="6" fill="#8b5cf6"/>
    <rect x="38" y="-54" width="4" height="12" fill="#8b5cf6"/>
    <rect x="44" y="-50" width="4" height="8" fill="#8b5cf6"/>
    
    <!-- Stats -->
    <rect x="-18" y="-35" width="72" height="3" rx="1" fill="#cbd5e1" opacity="0.3"/>
    <rect x="-18" y="-28" width="60" height="3" rx="1" fill="#e2e8f0" opacity="0.3"/>
    <rect x="-18" y="-21" width="68" height="3" rx="1" fill="#f1f5f9" opacity="0.3"/>
  </g>
  
  <!-- Floating Notification Card -->
  <g transform="translate(560, 220)" filter="url(#dropShadow2)">
    <rect x="0" y="0" width="130" height="70" rx="8" fill="#ffffff"/>
    <circle cx="18" cy="18" r="10" fill="#10b981"/>
    <path d="M 14 18 L 17 21 L 22 15" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Text lines -->
    <rect x="35" y="12" width="80" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="35" y="22" width="60" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="12" y="40" width="105" height="3" rx="1.5" fill="#f1f5f9"/>
    <rect x="12" y="48" width="85" height="3" rx="1.5" fill="#f1f5f9"/>
    <rect x="12" y="56" width="95" height="3" rx="1.5" fill="#f1f5f9"/>
  </g>
  
  <!-- Coffee Mug -->
  <g transform="translate(180, 480)">
    <ellipse cx="0" cy="0" rx="18" ry="6" fill="#cbd5e1"/>
    <rect x="-18" y="-28" width="36" height="28" rx="4" fill="#06b6d4"/>
    <rect x="-15" y="-25" width="30" height="22" rx="3" fill="#0891b2"/>
    <path d="M 18 -14 Q 28 -14 28 -7 Q 28 0 18 0" stroke="#06b6d4" stroke-width="3" fill="none"/>
    
    <!-- Steam -->
    <path d="M -6 -32 Q -4 -38 -6 -42" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6">
      <animate attributeName="d" values="M -6 -32 Q -4 -38 -6 -42;M -6 -32 Q -8 -38 -6 -42;M -6 -32 Q -4 -38 -6 -42" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 0 -32 Q 2 -38 0 -42" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6">
      <animate attributeName="d" values="M 0 -32 Q 2 -38 0 -42;M 0 -32 Q -2 -38 0 -42;M 0 -32 Q 2 -38 0 -42" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </path>
  </g>
  
  <!-- Books Stack -->
  <g transform="translate(600, 480)">
    <rect x="0" y="0" width="70" height="12" rx="2" fill="#ec4899"/>
    <rect x="-4" y="-14" width="74" height="12" rx="2" fill="#8b5cf6"/>
    <rect x="2" y="-28" width="66" height="12" rx="2" fill="#06b6d4"/>
  </g>
  
  <!-- Floating Tech Icons -->
  <g opacity="0.6">
    <!-- Kubernetes -->
    <g transform="translate(140, 200)">
      <circle cx="0" cy="0" r="16" fill="none" stroke="#06b6d4" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="#06b6d4"/>
      <line x1="0" y1="-16" x2="0" y2="-6" stroke="#06b6d4" stroke-width="1.5"/>
      <line x1="14" y1="-8" x2="5" y2="-3" stroke="#06b6d4" stroke-width="1.5"/>
      <line x1="14" y1="8" x2="5" y2="3" stroke="#06b6d4" stroke-width="1.5"/>
      <animate attributeName="transform" values="translate(140, 200) rotate(0);translate(140, 195) rotate(360);translate(140, 200) rotate(0)" dur="20s" repeatCount="indefinite"/>
    </g>
    
    <!-- Cloud -->
    <g transform="translate(680, 160)">
      <path d="M 0 6 Q -6 6 -6 0 Q -6 -6 0 -8 Q 3 -10 6 -8 Q 12 -8 12 0 Q 12 6 6 6 Z" fill="#fbbf24"/>
      <animate attributeName="transform" values="translate(680, 160);translate(680, 155);translate(680, 160)" dur="4s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="220" cy="180" r="3" fill="#ec4899" opacity="0.4"/>
  <circle cx="700" cy="320" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="160" cy="280" r="2" fill="#10b981" opacity="0.4"/>
  <circle cx="680" cy="380" r="2" fill="#8b5cf6" opacity="0.4"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGradient3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:0.3" />
    </radialGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="dropShadow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Ground Shadow -->
    <radialGradient id="groundShadow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:0" />
    </radialGradient>
    
    <!-- Screen Gradient -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient3)"/>
  
  <!-- Ground Shadow -->
  <ellipse cx="280" cy="560" rx="180" ry="25" fill="url(#groundShadow3)"/>
  
  <!-- Presentation Screen -->
  <g transform="translate(520, 200)" filter="url(#dropShadow3)">
    <!-- Screen stand -->
    <rect x="-4" y="180" width="8" height="70" rx="4" fill="#64748b"/>
    <ellipse cx="0" cy="250" rx="35" ry="8" fill="#475569"/>
    
    <!-- Screen frame -->
    <rect x="-170" y="0" width="340" height="220" rx="10" fill="#1e293b"/>
    <rect x="-162" y="8" width="324" height="204" rx="6" fill="url(#screenGrad)"/>
    
    <!-- Screen content -->
    <rect x="-155" y="15" width="310" height="190" rx="4" fill="#0f172a" opacity="0.8"/>
    
    <!-- CI/CD Pipeline -->
    <text x="0" y="35" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">CI/CD Pipeline</text>
    
    <!-- Pipeline stages -->
    <g transform="translate(-115, 55)">
      <!-- Code -->
      <rect x="0" y="0" width="55" height="45" rx="6" fill="#06b6d4" opacity="0.9"/>
      <text x="27" y="20" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">CODE</text>
      <circle cx="27" cy="32" r="6" fill="#ffffff" opacity="0.8"/>
      
      <!-- Arrow -->
      <path d="M 60 22 L 75 22" stroke="#10b981" stroke-width="2"/>
      <path d="M 72 19 L 75 22 L 72 25" stroke="#10b981" stroke-width="2" fill="none"/>
      
      <!-- Build -->
      <rect x="80" y="0" width="55" height="45" rx="6" fill="#10b981" opacity="0.9"/>
      <text x="107" y="20" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">BUILD</text>
      <rect x="100" y="28" width="14" height="10" rx="2" fill="#ffffff" opacity="0.8"/>
      
      <!-- Arrow -->
      <path d="M 140 22 L 155 22" stroke="#fbbf24" stroke-width="2"/>
      <path d="M 152 19 L 155 22 L 152 25" stroke="#fbbf24" stroke-width="2" fill="none"/>
      
      <!-- Test -->
      <rect x="160" y="0" width="55" height="45" rx="6" fill="#fbbf24" opacity="0.9"/>
      <text x="187" y="20" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">TEST</text>
      <path d="M 182 28 L 185 33 L 192 26" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
      
      <!-- Arrow down -->
      <path d="M 187 50 L 187 65" stroke="#ec4899" stroke-width="2"/>
      <path d="M 184 62 L 187 65 L 190 62" stroke="#ec4899" stroke-width="2" fill="none"/>
      
      <!-- Deploy -->
      <rect x="160" y="70" width="55" height="45" rx="6" fill="#ec4899" opacity="0.9"/>
      <text x="187" y="90" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">DEPLOY</text>
      <path d="M 187 98 L 187 105 M 182 100 L 187 95 L 192 100" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
      
      <!-- Arrow left -->
      <path d="M 155 92 L 140 92" stroke="#8b5cf6" stroke-width="2"/>
      <path d="M 143 89 L 140 92 L 143 95" stroke="#8b5cf6" stroke-width="2" fill="none"/>
      
      <!-- Monitor -->
      <rect x="80" y="70" width="55" height="45" rx="6" fill="#8b5cf6" opacity="0.9"/>
      <text x="107" y="90" font-family="Arial" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">MONITOR</text>
      <rect x="100" y="96" width="14" height="10" rx="1" fill="#ffffff" opacity="0.8"/>
      <rect x="103" y="99" width="3" height="4" fill="#8b5cf6"/>
      <rect x="107" y="101" width="3" height="2" fill="#8b5cf6"/>
      <rect x="111" y="98" width="3" height="5" fill="#8b5cf6"/>
      
      <!-- Arrow left -->
      <path d="M 75 92 L 60 92" stroke="#06b6d4" stroke-width="2"/>
      <path d="M 63 89 L 60 92 L 63 95" stroke="#06b6d4" stroke-width="2" fill="none"/>
      
      <!-- Feedback -->
      <rect x="0" y="70" width="55" height="45" rx="6" fill="#06b6d4" opacity="0.9"/>
      <text x="27" y="90" font-family="Arial" font-size="8" fill="#ffffff" text-anchor="middle" font-weight="bold">FEEDBACK</text>
      <circle cx="27" cy="100" r="6" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
      <path d="M 30 97 L 33 100 L 30 103" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.8"/>
      
      <!-- Arrow up -->
      <path d="M 27 65 L 27 50" stroke="#06b6d4" stroke-width="2"/>
      <path d="M 24 53 L 27 50 L 30 53" stroke="#06b6d4" stroke-width="2" fill="none"/>
    </g>
  </g>
  
  <!-- Woman Presenting -->
  <g transform="translate(280, 340)">
    <!-- Long Brown Hair - Back Layer -->
    <path d="M -35 -50 Q -45 -40 -50 -20 Q -52 0 -50 20 Q -48 40 -45 60 Q -42 80 -38 100 L -30 100 Q -32 80 -35 60 Q -38 40 -40 20 Q -42 0 -40 -20 Q -38 -35 -30 -45 Z" fill="#5d4037"/>
    <path d="M 35 -50 Q 45 -40 50 -20 Q 52 0 50 20 Q 48 40 45 60 Q 42 80 38 100 L 30 100 Q 32 80 35 60 Q 38 40 40 20 Q 42 0 40 -20 Q 38 -35 30 -45 Z" fill="#5d4037"/>
    <path d="M -20 -55 Q -25 -35 -28 -10 Q -30 15 -32 40 Q -34 65 -35 90 L -28 92 Q -26 67 -24 42 Q -22 17 -20 -8 Q -18 -33 -15 -50 Z" fill="#5d4037"/>
    <path d="M 20 -55 Q 25 -35 28 -10 Q 30 15 32 40 Q 34 65 35 90 L 28 92 Q 26 67 24 42 Q 22 17 20 -8 Q 18 -33 15 -50 Z" fill="#5d4037"/>
    
    <!-- Body - Smart Blazer -->
    <path d="M -45 20 L -50 40 L -45 100 L -20 120 L 20 120 L 45 100 L 50 40 L 45 20 Q 40 15 30 15 L -30 15 Q -40 15 -45 20 Z" fill="#6366f1"/>
    <!-- Blazer lapels -->
    <path d="M -30 15 L -35 30 L -25 50 L -15 40 L -10 20 Z" fill="#4f46e5"/>
    <path d="M 30 15 L 35 30 L 25 50 L 15 40 L 10 20 Z" fill="#4f46e5"/>
    <!-- Inner blouse -->
    <path d="M -10 20 L -15 40 L -10 60 L 0 65 L 10 60 L 15 40 L 10 20 Z" fill="#ffffff" opacity="0.9"/>
    
    <!-- Left Arm - Pointing -->
    <path d="M -45 30 Q -70 10 -90 -20" stroke="#6366f1" stroke-width="16" stroke-linecap="round" fill="none"/>
    <ellipse cx="-90" cy="-25" rx="12" ry="15" fill="#fbbf24"/>
    <!-- Pointing finger -->
    <path d="M -90 -35 L -90 -45" stroke="#d4a574" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Right Arm - Holding pointer -->
    <path d="M 45 30 Q 65 45 80 65" stroke="#6366f1" stroke-width="16" stroke-linecap="round" fill="none"/>
    <ellipse cx="80" cy="70" rx="12" ry="15" fill="#fbbf24"/>
    <!-- Fingers on pointer -->
    <path d="M 80 60 L 80 52" stroke="#d4a574" stroke-width="3" stroke-linecap="round"/>
    <path d="M 76 58 L 76 50" stroke="#d4a574" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Pointer stick -->
    <line x1="85" y1="72" x2="180" y2="-10" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
    <circle cx="180" cy="-10" r="5" fill="#ec4899"/>
    
    <!-- Legs -->
    <rect x="-22" y="120" width="18" height="70" rx="9" fill="#1e293b"/>
    <rect x="4" y="120" width="18" height="70" rx="9" fill="#1e293b"/>
    
    <!-- Shoes -->
    <ellipse cx="-13" cy="190" rx="14" ry="8" fill="#ec4899"/>
    <ellipse cx="13" cy="190" rx="14" ry="8" fill="#ec4899"/>
    
    <!-- Neck -->
    <path d="M -8 10 L -10 20 L 10 20 L 8 10 Z" fill="#fbbf24"/>
    
    <!-- Head -->
    <ellipse cx="0" cy="-10" rx="32" ry="38" fill="#fbbf24"/>
    
    <!-- Hair - Front Layer -->
    <path d="M -32 -15 Q -35 -25 -32 -35 Q -28 -45 -20 -48 Q -10 -50 0 -48 Q 10 -50 20 -48 Q 28 -45 32 -35 Q 35 -25 32 -15 L 32 -5 Q 30 5 25 10 L 20 5 Q 22 -5 22 -15 L 22 -25 Q 20 -35 15 -40 Q 10 -43 0 -43 Q -10 -43 -15 -40 Q -20 -35 -22 -25 L -22 -15 Q -22 -5 -20 5 L -25 10 Q -30 5 -32 -5 Z" fill="#5d4037"/>
    <!-- Side bangs -->
    <path d="M -28 -20 Q -30 -10 -28 0 L -25 5 Q -26 -5 -25 -15 Z" fill="#5d4037"/>
    <path d="M 28 -20 Q 30 -10 28 0 L 25 5 Q 26 -5 25 -15 Z" fill="#5d4037"/>
    
    <!-- Face Details -->
    <!-- Eyebrows -->
    <path d="M -18 -15 Q -12 -18 -6 -15" stroke="#5d4037" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M 6 -15 Q 12 -18 18 -15" stroke="#5d4037" stroke-width="2" stroke-linecap="round" fill="none"/>
    
    <!-- Eyes -->
    <ellipse cx="-12" cy="-8" rx="4" ry="5" fill="#1e293b"/>
    <ellipse cx="12" cy="-8" rx="4" ry="5" fill="#1e293b"/>
    <!-- Eye highlights -->
    <ellipse cx="-11" cy="-10" rx="1.5" ry="2" fill="#ffffff"/>
    <ellipse cx="13" cy="-10" rx="1.5" ry="2" fill="#ffffff"/>
    <!-- Eyelashes -->
    <path d="M -15 -10 L -17 -12" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
    <path d="M -13 -11 L -14 -14" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
    <path d="M 15 -10 L 17 -12" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
    <path d="M 13 -11 L 14 -14" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Nose -->
    <path d="M 0 -5 L 0 3" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M -3 3 Q 0 5 3 3" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    
    <!-- Lips - Confident smile -->
    <path d="M -10 10 Q 0 14 10 10" fill="#ec4899" opacity="0.6"/>
    <path d="M -10 10 Q 0 8 10 10" stroke="#d946a6" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Audience Silhouettes -->
  <g opacity="0.25">
    <ellipse cx="100" cy="500" rx="22" ry="28" fill="#475569"/>
    <circle cx="100" cy="465" r="18" fill="#475569"/>
    
    <ellipse cx="160" cy="510" rx="25" ry="30" fill="#475569"/>
    <circle cx="160" cy="472" r="20" fill="#475569"/>
    
    <ellipse cx="60" cy="515" rx="20" ry="26" fill="#475569"/>
    <circle cx="60" cy="483" r="16" fill="#475569"/>
  </g>
  
  <!-- Podium with laptop -->
  <g transform="translate(180, 500)">
    <rect x="-25" y="-15" width="50" height="30" rx="4" fill="#64748b"/>
    <rect x="-20" y="-13" width="40" height="12" rx="2" fill="#1e293b"/>
    <rect x="-18" y="-11" width="36" height="8" rx="1" fill="#6366f1"/>
    <ellipse cx="0" cy="-8" rx="25" ry="4" fill="#6366f1" opacity="0.2"/>
  </g>
  
  <!-- Floating Idea Card -->
  <g transform="translate(350, 150)" filter="url(#dropShadow3)">
    <ellipse cx="0" cy="0" rx="32" ry="24" fill="#ffffff"/>
    <path d="M -12 12 L -18 22 L -8 15" fill="#ffffff"/>
    <circle cx="0" cy="-5" r="8" fill="#fbbf24"/>
    <path d="M -2 -8 L 2 -8 M 0 -10 L 0 -2 M -4 -4 L 4 -4" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <animate attributeName="transform" values="translate(350, 150);translate(350, 145);translate(350, 150)" dur="2.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Floating Tech Icons -->
  <g opacity="0.6">
    <!-- Microphone -->
    <g transform="translate(650, 450)">
      <rect x="-6" y="-24" width="12" height="20" rx="6" fill="#06b6d4"/>
      <line x1="0" y1="-4" x2="0" y2="8" stroke="#06b6d4" stroke-width="2"/>
      <path d="M -8 8 L 8 8" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
      <animate attributeName="transform" values="translate(650, 450);translate(650, 445);translate(650, 450)" dur="2s" repeatCount="indefinite"/>
    </g>
    
    <!-- Star -->
    <g transform="translate(680, 140)">
      <path d="M 0 -10 L 2.5 -2.5 L 10 -2.5 L 4 2 L 6.5 10 L 0 5 L -6.5 10 L -4 2 L -10 -2.5 L -2.5 -2.5 Z" fill="#ec4899"/>
      <animate attributeName="transform" values="translate(680, 140) rotate(0);translate(680, 140) rotate(360)" dur="10s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="140" cy="180" r="3" fill="#ec4899" opacity="0.4"/>
  <circle cx="710" cy="360" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="170" cy="140" r="2" fill="#10b981" opacity="0.4"/>
  <circle cx="680" cy="400" r="2" fill="#8b5cf6" opacity="0.4"/>
</svg>
